<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountain West</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    #root {
      height: 100%;
    }
  </style>
</head>

<body>
  <!-- added form here to allow netlify to capture form submissions without needing to add a backend route for it -->
  <form name="contact" method="POST" data-netlify="true" hidden>
    <input type="hidden" name="form-name" value="contact" />
  </form>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
